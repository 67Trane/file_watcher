name: Update parent repo

on:
  push:
    branches: [main]

jobs:
  update-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repo update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PARENT_REPO_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: '67Trane',
              repo: 'documentscanner-deploy',
              workflow_id: 'sync-submodules.yml',
              ref: 'main'
            })